apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: podinfo-main
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/amarpal-singh5/platform-fleet.git
    targetRevision: HEAD
    path: gitops/overlays/main
  destination:
    server: https://kubernetes.default.svc
    namespace: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
