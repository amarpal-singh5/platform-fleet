name: CI

on:
  pull_request:
    branches: [main]

jobs:
  terraform-lint:
    name: Terraform Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive terraform/

      - name: Terraform Init (main env)
        run: terraform -chdir=terraform/environments/main init -backend=false

      - name: Terraform Validate
        run: terraform -chdir=terraform/environments/main validate

  kustomize-build:
    name: Kustomize Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Build main overlay
        run: kubectl kustomize gitops/overlays/main

      - name: Build preview overlay
        run: kubectl kustomize gitops/overlays/preview
