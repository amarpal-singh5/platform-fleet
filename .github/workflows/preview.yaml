name: Preview Environments

on:
  pull_request:
    types: [opened]
    branches: [main]

# Deploy and teardown are handled entirely by ArgoCD's podinfo-preview
# ApplicationSet (gitops/apps/podinfo-preview-appset.yaml) - it polls
# GitHub's PR list directly and creates/destroys the preview Application
# itself. This workflow doesn't touch the cluster at all; it just posts
# a heads-up comment so it's obvious a preview env is coming.
jobs:
  comment:
    name: Comment Preview Info
    runs-on: ubuntu-latest
    steps:
      - name: Comment preview info on PR
        uses: actions/github-script@v7
        with:
          script: |
            const ns = `preview-${context.issue.number}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Preview environment incoming**\n\nArgoCD will pick this PR up on its next poll (every ~3 min) and deploy it to \`${ns}\`.\n\nOnce synced, access locally:\n\`\`\`bash\nkubectl port-forward svc/podinfo -n ${ns} 9898:9898\n\`\`\`\n\nAuto-destroyed when this PR closes - ArgoCD notices it's no longer open and tears it down, no action needed here.`
            })
