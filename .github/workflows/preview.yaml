name: Preview Environments

on:
  pull_request:
    types: [opened]
    branches: [main]

permissions:
  pull-requests: write
  issues: write

# Deploy and teardown are handled entirely by ArgoCD's podinfo-preview
# ApplicationSet (gitops/apps/podinfo-preview-appset.yaml) - it polls
# GitHub's PR list directly and creates/destroys the preview Application
# itself. This workflow doesn't touch the cluster at all; it just posts
# a heads-up comment so it's obvious a preview env is coming.
jobs:
  comment:
    name: Comment Preview Info
    runs-on: ubuntu-latest
    steps:
      - name: Comment preview info on PR
        uses: actions/github-script@v7
        with:
          script: |
            const ns = `preview-${context.issue.number}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Preview env for this PR will deploy to \`${ns}\`. ArgoCD polls for open PRs every ~3 min, so give it a few minutes after this comment posts.\n\nOnce it's synced:\n\`\`\`bash\nkubectl port-forward svc/podinfo -n ${ns} 9898:9898\n\`\`\`\n\nGets torn down automatically when this PR closes - nothing to clean up manually.` 
            })
